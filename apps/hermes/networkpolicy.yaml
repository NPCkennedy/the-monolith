apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-netpol
  namespace: spencer-os
spec:
  podSelector:
    matchLabels:
      app: hermes
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 8000
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app: graphiti-mcp
    - ports:
        - port: 8080
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: searxng
    - ports:
        - port: 7687
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: neo4j
    - ports:
        - port: 22
          protocol: TCP
      to:
        - ipBlock:
            cidr: 192.168.20.10/32
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector: {}
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
      to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8
              - 192.168.0.0/16
              - 172.16.0.0/12
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 9119
          protocol: TCP
    - from:
        - podSelector: {}
