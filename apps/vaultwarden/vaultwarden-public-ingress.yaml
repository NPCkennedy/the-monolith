apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaultwarden-public-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
  - hosts:
    - vaultwarden.spencer-kennedy.com
    secretName: homelab-tls
  rules:
  - host: vaultwarden.spencer-kennedy.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vaultwarden
            port:
              number: 80