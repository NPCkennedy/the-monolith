apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
      - name: vaultwarden
        image: vaultwarden/server:latest
        ports:
        - containerPort: 80
        env:
        - name: DOMAIN
          value: https://vaultwarden.homelab.local
        - name: SIGNUPS_ALLOWED
          value: "true"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vaultwarden-db-credentials
              key: database-url