apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: monitoring
  labels:
    app: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.11.0    # pin, never :latest
          args: ["serve"]
          ports:
            - containerPort: 80
              name: http
          env:
            - name: NTFY_BASE_URL
              value: "http://ntfy.monitoring.svc.cluster.local"
            - name: NTFY_LISTEN_HTTP
              value: ":80"
          # Stateless relay — no PVC. Add one only if you want message history.
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: monitoring
  labels:
    app: ntfy
spec:
  selector:
    app: ntfy
  ports:
    - port: 80
      targetPort: 80
      name: http
