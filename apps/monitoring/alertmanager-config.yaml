apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-kube-prometheus-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    inhibit_rules:
    - equal:
      - namespace
      - alertname
      source_matchers:
      - severity = critical
      target_matchers:
      - severity =~ warning|info
    - equal:
      - namespace
      - alertname
      source_matchers:
      - severity = warning
      target_matchers:
      - severity = info
    - equal:
      - namespace
      source_matchers:
      - alertname = InfoInhibitor
      target_matchers:
      - severity = info
    - target_matchers:
      - alertname = InfoInhibitor
    receivers:
    - name: ntfy
      webhook_configs:
      - http_config:
          follow_redirects: true
        max_alerts: 1
    	send_resolved: true
    	url: https://ntfy.sh/spencer-monolith-skt?template=alertmanager
    - name: "null"
    route:
      group_by:
      - namespace
      group_interval: 5m
      group_wait: 30s
      receiver: ntfy
      repeat_interval: 12h
      routes:
      - matchers:
        - alertname != "Watchdog"
        receiver: ntfy
    templates:
    - /etc/alertmanager/config/*.tmpl