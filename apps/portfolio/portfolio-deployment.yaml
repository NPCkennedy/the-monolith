apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: portfolio
        image: npckennedy/portfolio:b2ebd246821eee43894199c9e646a70c1984eb21
        ports:
        - containerPort: 5000