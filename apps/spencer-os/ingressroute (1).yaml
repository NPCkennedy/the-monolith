apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes
  namespace: spencer-os
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`spencer-os.homelab.local`)
      kind: Rule
      services:
        - name: hermes
          port: 9119    # dashboard — the day-to-day interface
  tls:
    secretName: homelab-local-tls
# Reachable at https://spencer-os.homelab.local (internal + Tailscale)
# Requires: homelab-local-tls copied into spencer-os namespace (see README)
# Requires: pfSense DNS override spencer-os -> homelab.local -> 192.168.20.10
