apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: spencer-os
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate          # single RWO volume — never run two pods against it
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.7.1
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: gateway
            - containerPort: 9119
              name: dashboard
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-provider
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hermes-auth
                  key: username
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-auth
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /opt/data   # all Hermes state lives here
          readinessProbe:
            tcpSocket:
              port: 9119
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9119
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
