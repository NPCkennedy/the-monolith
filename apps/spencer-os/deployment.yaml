apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: spencer-os
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate          # single RWO volume — never run two pods against it
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          # Pin the version. Do NOT use :latest — Hermes is pre-1.0 and ships
          # breaking changes weekly. Bump deliberately after reading release notes.
          image: nousresearch/hermes-agent:0.15.2
          ports:
            - containerPort: 8642
              name: gateway
          # No env vars needed for the API key.
          # Hermes reads credentials from ~/.hermes/.env (on the PVC).
          # Set the key after first deploy: see README step 3.
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /home/node/.hermes   # everything stateful lives here
          readinessProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
