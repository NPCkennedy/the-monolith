apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 10.1.1
    helm:
      parameters:
        - name: server.insecure
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - ServerSideApply=true