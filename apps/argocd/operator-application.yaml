apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NPCkennedy/the-monolith
    path: apps/argocd
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - ServerSideApply=true