apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    # Source 1 — git repo, referenced ONLY to supply the values file.
    - repoURL: https://github.com/NPCkennedy/the-monolith
      targetRevision: main
      ref: values
    # Source 2 — the Helm chart, pulling values from the git ref above.
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.8.0
      helm:
        releaseName: monitoring
        valueFiles:
          - $values/apps/monitoring-stack/values.yaml
  syncPolicy:
    syncOptions:
      - ServerSideApply=true        
      - RespectIgnoreDifferences=true
