apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawl4ai
  namespace: spencer-os
  labels:
    app: crawl4ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawl4ai
  template:
    metadata:
      labels:
        app: crawl4ai
    spec:
      enableServiceLinks: false
      containers:
        - name: crawl4ai
          image: unclecode/crawl4ai:latest
          imagePullPolicy: Always
          env:
            - name: CRAWL4AI_API_TOKEN
              value: "spencer-crawl4ai-2026"
            - name: REDIS_PASSWORD
              value: "redis-spencer-2026"
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 60
            failureThreshold: 5
            timeoutSeconds: 10
        - name: mcp-proxy
          image: alpine/socat:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              sleep 5 && socat TCP-LISTEN:11235,fork,reuseaddr,resolve-timeout=5,retry=10,interval=3 TCP:127.0.0.1:11235
          ports:
            - containerPort: 11235
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
