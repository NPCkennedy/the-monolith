apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawl4ai
  namespace: spencer-os
  labels:
    app: crawl4ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawl4ai
  template:
    metadata:
      labels:
        app: crawl4ai
    spec:
      enableServiceLinks: false
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k3s-worker2
      containers:
        - name: crawl4ai
          image: unclecode/crawl4ai:latest
          ports:
            - containerPort: 11235
              name: internal
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: config
              mountPath: /app/config.yml
              subPath: config.yml
          livenessProbe:
            httpGet:
              path: /
              port: 11235
            initialDelaySeconds: 60
            periodSeconds: 30        
        - name: socat-bridge
          image: alpine/socat:1.8.0.0
          args:
            - "TCP-LISTEN:8080,fork,reuseaddr"
            - "TCP:127.0.0.1:11235"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: config
          configMap:
            name: crawl4ai-config
---
apiVersion: v1
kind: Service
metadata:
  name: crawl4ai
  namespace: spencer-os
  labels:
    app: crawl4ai
spec:
  selector:
    app: crawl4ai
  ports:
    - port: 11235          
      targetPort: 8080     
      name: http