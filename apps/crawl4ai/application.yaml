apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crawl4ai
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NPCkennedy/the-monolith
    targetRevision: main
    path: apps/crawl4ai
  destination:
    server: https://kubernetes.default.svc
    namespace: spencer-os
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
