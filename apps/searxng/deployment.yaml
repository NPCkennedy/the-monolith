apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  labels:
    app: searxng
    app.kubernetes.io/part-of: searxng
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
        app.kubernetes.io/part-of: searxng
    spec:
      # Prevents K8s injecting SEARXNG_PORT=tcp://... which breaks SearXNG's
      # port argument parsing
      enableServiceLinks: false
      initContainers:
        - name: copy-settings
          image: busybox
          command: ["sh", "-c", "cp /searxng-config/settings.yml /etc/searxng/settings.yml && chmod 644 /etc/searxng/settings.yml"]
          volumeMounts:
            - name: settings-source
              mountPath: /searxng-config
            - name: settings-writable
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SEARXNG_BASE_URL
              value: "https://searxng.homelab.local/"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: secret_key
          volumeMounts:
            - name: settings-writable
              mountPath: /etc/searxng
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: settings-source
          configMap:
            name: searxng-settings
        - name: settings-writable
          emptyDir: {}
